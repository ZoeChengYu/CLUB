<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPC 程式設計研究社 帳務總表</title>
  <meta name="description" content="NPC 程式設計研究社歷年帳務總表，2019 年至今完整財務紀錄" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0e17;
      --bg2: #111827;
      --bg3: #1a2235;
      --bg4: #1e2a3d;
      --bg-hover: #243049;
      --border: #2a3a55;
      --border2: #3a4f72;
      --text: #e2e8f4;
      --text2: #8fa4c8;
      --text3: #546a8c;
      --blue: #4d9eff;
      --blue2: #1d6fdb;
      --green: #34d399;
      --red: #f87171;
      --purple: #a78bfa;
      --orange: #fb923c;
      --yellow: #fbbf24;
      --teal: #2dd4bf;
      --grad-blue: linear-gradient(135deg,#1a4fa3,#3b82f6);
      --grad-green: linear-gradient(135deg,#065f46,#10b981);
      --grad-red: linear-gradient(135deg,#7f1d1d,#ef4444);
      --grad-purple: linear-gradient(135deg,#4c1d95,#8b5cf6);
      --shadow: 0 4px 32px rgba(0,0,0,.5);
      --r: 14px;
      --r2: 8px;
      --t: .2s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

    /* ── Starfield bg ── */
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 120% 60% at 50% 0%,rgba(29,111,219,.12) 0%,transparent 60%),
                 radial-gradient(ellipse 60% 40% at 80% 100%,rgba(139,92,246,.08) 0%,transparent 50%);
      pointer-events:none;z-index:0
    }

    /* ── Header ── */
    header{
      position:relative;z-index:1;
      padding:60px 40px 48px;
      border-bottom:1px solid var(--border);
    }
    .header-inner{max-width:1300px;margin:0 auto;display:flex;gap:32px;align-items:flex-end;flex-wrap:wrap;justify-content:space-between}
    .header-badge{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(77,158,255,.1);border:1px solid rgba(77,158,255,.3);
      border-radius:20px;padding:5px 16px;margin-bottom:14px;
      font-size:.72rem;font-weight:600;letter-spacing:.1em;color:var(--blue);text-transform:uppercase
    }
    .badge-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    h1{
      font-size:clamp(2rem,4vw,3.2rem);font-weight:700;letter-spacing:-.03em;
      background:linear-gradient(90deg,#e2e8f4 0%,#7eb3ff 60%,#a78bfa 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:8px
    }
    .header-sub{color:var(--text2);font-size:.95rem}
    .header-right{text-align:right}
    .header-right .label{font-size:.72rem;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
    .header-balance{font-family:'JetBrains Mono',monospace;font-size:2.2rem;font-weight:700;color:var(--green);letter-spacing:-.02em}
    .header-balance-sub{font-size:.78rem;color:var(--text3);margin-top:4px}

    /* ── Nav tabs ── */
    .nav-tabs{
      position:sticky;top:0;z-index:100;
      background:rgba(10,14,23,.9);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:0 40px
    }
    .nav-tabs-inner{max-width:1300px;margin:0 auto;display:flex;gap:2px}
    .tab-btn{
      padding:14px 22px;
      background:none;border:none;border-bottom:3px solid transparent;
      color:var(--text2);font-size:.88rem;font-weight:500;font-family:inherit;
      cursor:pointer;transition:all var(--t);white-space:nowrap;margin-bottom:-1px
    }
    .tab-btn:hover{color:var(--text)}
    .tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}

    /* ── Main layout ── */
    main{max-width:1300px;margin:0 auto;padding:40px 40px 80px;position:relative;z-index:1}
    .section{display:none}
    .section.active{display:block}

    /* ── Cards grid ── */
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:36px}
    .card{
      background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
      padding:22px 20px;transition:transform var(--t),border-color var(--t),box-shadow var(--t)
    }
    .card:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:var(--shadow)}
    .card-icon{font-size:1.4rem;margin-bottom:12px}
    .card-label{font-size:.7rem;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:8px}
    .card-val{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:600;letter-spacing:-.02em}
    .card-sub{font-size:.72rem;color:var(--text3);margin-top:6px}
    .c-green .card-val{color:var(--green)}
    .c-blue  .card-val{color:var(--blue)}
    .c-red   .card-val{color:var(--red)}
    .c-purple.card-val{color:var(--purple)}
    .c-orange .card-val{color:var(--orange)}
    .c-yellow .card-val{color:var(--yellow)}
    .c-teal  .card-val{color:var(--teal)}
    .card{border-top:3px solid var(--border)}
    .c-green {border-top-color:var(--green)}
    .c-blue  {border-top-color:var(--blue)}
    .c-red   {border-top-color:var(--red)}
    .c-purple{border-top-color:var(--purple)}
    .c-orange{border-top-color:var(--orange)}
    .c-yellow{border-top-color:var(--yellow)}
    .c-teal  {border-top-color:var(--teal)}

    /* ── Section titles ── */
    .sec-title{
      font-size:.78rem;font-weight:600;letter-spacing:.1em;
      text-transform:uppercase;color:var(--text3);
      display:flex;align-items:center;gap:12px;margin-bottom:18px
    }
    .sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

    /* ── Charts row ── */
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:36px}
    @media(max-width:900px){.charts-row{grid-template-columns:1fr}}
    .chart-box{
      background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:24px
    }
    .chart-title{font-size:.85rem;font-weight:600;color:var(--text2);margin-bottom:16px}
    svg.chart{width:100%;overflow:visible}

    /* ── Persons chart ── */
    .person-bar-wrap{display:flex;flex-direction:column;gap:12px}
    .person-row{display:grid;grid-template-columns:80px 1fr 80px;gap:10px;align-items:center}
    .person-name{font-size:.78rem;color:var(--text2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .person-track{background:var(--bg);border-radius:4px;height:8px;overflow:hidden}
    .person-fill{height:100%;border-radius:4px;background:var(--grad-blue);transition:width 1s cubic-bezier(.4,0,.2,1)}
    .person-count{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text3)}

    /* ── Pie / donut ── */
    .donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
    .donut-legend{display:flex;flex-direction:column;gap:10px}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text2)}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

    /* ── Table section ── */
    .table-controls{
      display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px
    }
    .search-wrap{position:relative;flex:1;min-width:220px}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.9rem;pointer-events:none}
    .search-input{
      width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);
      padding:10px 14px 10px 36px;color:var(--text);font-size:.88rem;font-family:inherit;
      outline:none;transition:border-color var(--t)
    }
    .search-input::placeholder{color:var(--text3)}
    .search-input:focus{border-color:var(--blue)}
    .filter-select{
      background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);
      padding:10px 14px;color:var(--text);font-size:.82rem;font-family:inherit;
      outline:none;cursor:pointer;transition:border-color var(--t)
    }
    .filter-select:focus{border-color:var(--blue)}
    .filter-select option{background:var(--bg3)}
    .btn-reset{
      background:none;border:1px solid var(--border);border-radius:var(--r2);
      padding:10px 16px;color:var(--text2);font-size:.82rem;font-family:inherit;
      cursor:pointer;transition:all var(--t)
    }
    .btn-reset:hover{border-color:var(--border2);color:var(--text)}
    .result-count{font-size:.78rem;color:var(--text3);white-space:nowrap}

    .table-wrap{
      background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
      overflow-x:auto;-webkit-overflow-scrolling:touch
    }
    .table-wrap::-webkit-scrollbar{height:5px}
    .table-wrap::-webkit-scrollbar-track{background:var(--bg2)}
    .table-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
    .table-wrap::-webkit-scrollbar-thumb:hover{background:var(--blue)}
    table{width:max-content;min-width:100%;border-collapse:collapse;font-size:.83rem}
    thead tr{background:var(--bg2);border-bottom:1px solid var(--border)}
    th{
      padding:13px 14px;text-align:left;white-space:nowrap;
      font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
      color:var(--text3);cursor:pointer;user-select:none;
      transition:color var(--t);position:sticky;top:0;background:var(--bg2)
    }
    th:hover{color:var(--text2)}
    th.sorted{color:var(--blue)}
    th .si{margin-left:3px;opacity:.4;font-size:.65rem}
    th.sorted .si{opacity:1}
    tbody tr{border-bottom:1px solid rgba(42,58,85,.5);transition:background var(--t)}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:var(--bg-hover)}
    td{padding:12px 14px;vertical-align:middle;white-space:nowrap}
    .td-idx{width:40px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text3)}
    .td-date{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text3)}
    .td-item{font-weight:500;max-width:220px;white-space:normal;min-width:140px;line-height:1.4}
    .td-method{font-size:.78rem;color:var(--text2)}
    .td-person{font-size:.8rem}
    .td-flow{font-size:.72rem;color:var(--text3);max-width:180px;white-space:normal;line-height:1.3}
    .td-num{font-family:'JetBrains Mono',monospace;text-align:right;font-size:.82rem}
    .pos{color:var(--green)}
    .neg{color:var(--red)}
    .neu{color:var(--text3)}
    .td-total{color:var(--blue);font-weight:600}
    .td-note{font-size:.72rem;color:var(--text3);max-width:200px;white-space:normal;line-height:1.3}
    .no-data{text-align:center;padding:56px;color:var(--text3);font-size:.9rem}
    .tag{
      display:inline-flex;align-items:center;gap:4px;
      padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:600
    }
    .tag-in{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.25)}
    .tag-out{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.25)}
    .tag-calc{background:rgba(251,191,36,.1);color:var(--yellow);border:1px solid rgba(251,191,36,.25)}
    .tag-bank{background:rgba(167,139,250,.1);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
    .tag-done{background:rgba(52,211,153,.08);color:var(--green);border:1px solid rgba(52,211,153,.2)}
    .tag-pending{background:rgba(251,191,36,.08);color:var(--yellow);border:1px solid rgba(251,191,36,.2)}

    /* ── Pagination ── */
    .pagination{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:16px 0}
    .page-info{font-size:.78rem;color:var(--text3)}
    .page-btns{display:flex;gap:6px}
    .page-btn{
      background:var(--bg4);border:1px solid var(--border);border-radius:var(--r2);
      padding:7px 14px;color:var(--text2);font-size:.8rem;font-family:inherit;
      cursor:pointer;transition:all var(--t)
    }
    .page-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
    .page-btn.active{background:var(--blue2);border-color:var(--blue);color:#fff}
    .page-btn:disabled{opacity:.3;cursor:default}

    /* ── Trend toggle ── */
    .trend-opts{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .trend-opt{
      padding:5px 14px;border-radius:20px;border:1px solid var(--border);
      background:none;color:var(--text2);font-size:.78rem;font-family:inherit;
      cursor:pointer;transition:all var(--t)
    }
    .trend-opt.active{background:var(--blue2);border-color:var(--blue);color:#fff}

    /* ── Footer ── */
    footer{
      text-align:center;padding:36px;border-top:1px solid var(--border);
      color:var(--text3);font-size:.78rem;position:relative;z-index:1
    }
    footer span{color:var(--text2)}

    /* ── Responsive ── */
    @media(max-width:640px){
      header,main{padding-left:16px;padding-right:16px}
      h1{font-size:1.8rem}
      .nav-tabs{padding:0 16px}
      .tab-btn{padding:12px 12px;font-size:.82rem}
    }

    /* ── Animate ── */
    .fade-in{opacity:0;transform:translateY(16px);animation:fi .45s ease forwards}
    @keyframes fi{to{opacity:1;transform:none}}
    .fade-in:nth-child(2){animation-delay:.06s}
    .fade-in:nth-child(3){animation-delay:.12s}
    .fade-in:nth-child(4){animation-delay:.18s}
    .fade-in:nth-child(5){animation-delay:.24s}
    .fade-in:nth-child(6){animation-delay:.3s}
    .fade-in:nth-child(7){animation-delay:.36s}
  </style>
</head>
<body>

<!-- ════ HEADER ════ -->
<header>
  <div class="header-inner">
    <div>
      <div class="header-badge"><span class="badge-dot"></span>NPC 程式設計研究社</div>
      <h1>帳務總表</h1>
      <p class="header-sub">歷年完整財務紀錄 ／ 2019 年 12 月 — 2026 年 5 月</p>
    </div>
    <div class="header-right">
      <div class="label">最新總餘額</div>
      <div class="header-balance" id="hdr-balance">計算中…</div>
      <div class="header-balance-sub">現金 + 帳戶</div>
    </div>
  </div>
</header>

<!-- ════ NAV TABS ════ -->
<nav class="nav-tabs" role="navigation" aria-label="頁面分頁">
  <div class="nav-tabs-inner">
    <button class="tab-btn active" id="tab-overview" onclick="switchTab('overview')">📊 總覽</button>
    <button class="tab-btn" id="tab-ledger" onclick="switchTab('ledger')">📋 帳務明細</button>
    <button class="tab-btn" id="tab-trend" onclick="switchTab('trend')">📈 餘額走勢</button>
    <button class="tab-btn" id="tab-persons" onclick="switchTab('persons')">👥 財務負責人</button>
  </div>
</nav>

<!-- ════ MAIN ════ -->
<main>

  <!-- ── 總覽 ── -->
  <section id="sec-overview" class="section active">
    <div class="cards" id="overview-cards"></div>

    <div class="sec-title">支出 vs 收入 ／ 金流方式分佈</div>
    <div class="charts-row">
      <div class="chart-box">
        <div class="chart-title">金流方式佔比</div>
        <div class="donut-wrap">
          <svg id="donut-svg" class="chart" style="max-width:180px" viewBox="0 0 180 180"></svg>
          <div class="donut-legend" id="donut-legend"></div>
        </div>
      </div>
      <div class="chart-box">
        <div class="chart-title">年度收支總覽</div>
        <svg id="bar-chart-svg" class="chart" viewBox="0 0 560 200" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>

    <div class="sec-title">財務負責人統計</div>
    <div class="chart-box" style="margin-bottom:36px">
      <div class="person-bar-wrap" id="person-bars"></div>
    </div>
  </section>

  <!-- ── 帳務明細 ── -->
  <section id="sec-ledger" class="section">
    <div class="table-controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search" type="text" placeholder="搜尋項目、備註、人名…" aria-label="搜尋交易" />
      </div>
      <select class="filter-select" id="filter-person" aria-label="篩選財務負責人">
        <option value="">所有負責人</option>
      </select>
      <select class="filter-select" id="filter-method" aria-label="篩選金流方式">
        <option value="">所有方式</option>
      </select>
      <select class="filter-select" id="filter-type" aria-label="篩選金流方向">
        <option value="">所有類型</option>
        <option value="in">收入</option>
        <option value="out">支出</option>
        <option value="calc">財務計算</option>
        <option value="bank">帳戶內部</option>
      </select>
      <select class="filter-select" id="filter-year" aria-label="篩選年份">
        <option value="">所有年份</option>
      </select>
      <button class="btn-reset" onclick="resetFilters()">↺ 重設</button>
      <span class="result-count" id="result-count"></span>
    </div>
    <div class="table-wrap">
      <table aria-label="帳務明細">
        <thead>
          <tr>
            <th class="td-idx">#</th>
            <th data-col="date">日期<span class="si">↕</span></th>
            <th data-col="item">項目<span class="si">↕</span></th>
            <th>類型</th>
            <th data-col="method">方式<span class="si">↕</span></th>
            <th data-col="person">負責人<span class="si">↕</span></th>
            <th>來源/對象</th>
            <th data-col="local" style="text-align:right">現金流動<span class="si">↕</span></th>
            <th data-col="localBalance" style="text-align:right">現金結餘<span class="si">↕</span></th>
            <th data-col="account" style="text-align:right">帳戶流動<span class="si">↕</span></th>
            <th data-col="accountBalance" style="text-align:right">帳戶結餘<span class="si">↕</span></th>
            <th data-col="total" style="text-align:right">總餘額<span class="si">↕</span></th>
            <th>備註</th>
          </tr>
        </thead>
        <tbody id="ledger-body"></tbody>
      </table>
    </div>
    <div class="pagination">
      <div class="page-info" id="page-info"></div>
      <div class="page-btns" id="page-btns"></div>
    </div>
  </section>

  <!-- ── 走勢 ── -->
  <section id="sec-trend" class="section">
    <div class="trend-opts">
      <button class="trend-opt active" onclick="drawTrend('total')">總餘額</button>
      <button class="trend-opt" onclick="drawTrend('local')">現金結餘</button>
      <button class="trend-opt" onclick="drawTrend('account')">帳戶結餘</button>
    </div>
    <div class="chart-box">
      <svg id="trend-svg" class="chart" viewBox="0 0 1000 320" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  </section>

  <!-- ── 財務負責人 ── -->
  <section id="sec-persons" class="section">
    <div id="persons-detail"></div>
  </section>

</main>

<footer>
  <span>NPC 程式設計研究社</span> · 帳務總表 · 資料更新至 2026/05/25 · 共 267 筆紀錄
</footer>

<script>
// ────────────────────────────────────────────────────────────
//  DATA  (embedded directly for zero-dependency usage)
// ────────────────────────────────────────────────────────────
const RAW_JSON = `PLACEHOLDER`;

// We load data from the JSON file via fetch if possible, otherwise embedded
let DATA = [];

// ── Helpers ─────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = (n, sign=false) => {
  if (n === null || n === undefined || n === '') return '<span class="neu">—</span>';
  const v = Number(n);
  if (isNaN(v)) return `<span class="neu">${n}</span>`;
  if (v === 0) return '<span class="neu">—</span>';
  const s = `$${Math.abs(v).toLocaleString()}`;
  if (sign) return v > 0 ? `<span class="pos">+${s}</span>` : `<span class="neg">-${s}</span>`;
  return v >= 0 ? `<span>${s}</span>` : `<span class="neg">${s}</span>`;
};
const fmtPlain = n => n ? `$${Number(n).toLocaleString()}` : '—';

function getType(r) {
  if (r.method === '財務計算') return 'calc';
  const m = (r.method || '').toLowerCase();
  if (m.includes('郵局內部') || m === '郵局內務') return 'bank';
  const local = Number(r.local) || 0;
  const acct  = Number(r.account) || 0;
  if (local > 0 || acct > 0) return 'in';
  if (local < 0 || acct < 0) return 'out';
  return 'calc';
}
function typeTag(t) {
  const map = {
    in:   ['tag-in','▲ 收入'],
    out:  ['tag-out','▼ 支出'],
    calc: ['tag-calc','⚖ 計算'],
    bank: ['tag-bank','🏦 帳戶'],
  };
  const [cls, txt] = map[t] || ['tag-calc', t];
  return `<span class="tag ${cls}">${txt}</span>`;
}
function statusTag(s) {
  if (!s) return '';
  if (s.includes('Done')) return `<span class="tag tag-done">✔</span>`;
  return `<span class="tag tag-pending">…</span>`;
}

// ── Tab switching ─────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  $('tab-'+name).classList.add('active');
  $('sec-'+name).classList.add('active');
  if (name === 'trend') { setTimeout(() => drawTrend(currentTrend), 50); }
  if (name === 'persons') renderPersonsDetail();
}

// ────────────────────────────────────────────────────────────
//  OVERVIEW
// ────────────────────────────────────────────────────────────
function renderOverview() {
  // Latest row with total
  const withTotal = DATA.filter(r => r.total !== null && r.total !== undefined && r.total !== '');
  const last = withTotal[withTotal.length - 1];
  $('hdr-balance').textContent = last ? fmtPlain(last.total) : '—';

  const totalIncome  = DATA.reduce((s,r) => s + Math.max(0, Number(r.local)||0) + Math.max(0, Number(r.account)||0), 0);
  const totalExpense = DATA.reduce((s,r) => s + Math.min(0, Number(r.local)||0) + Math.min(0, Number(r.account)||0), 0);
  const maxTotal = Math.max(...withTotal.map(r => Number(r.total)||0));
  const minTotal = Math.min(...withTotal.map(r => Number(r.total)||0));
  const txCount = DATA.length;
  const years = [...new Set(DATA.map(r => (r.date||'').slice(0,4)).filter(Boolean))].length;

  const cards = [
    {cls:'c-green', icon:'💰', label:'最新總餘額', val: fmtPlain(last?.total), sub:'現金 + 帳戶'},
    {cls:'c-blue',  icon:'📥', label:'歷年總收入', val: fmtPlain(totalIncome),  sub:'含入社費、補助等'},
    {cls:'c-red',   icon:'📤', label:'歷年總支出', val: fmtPlain(Math.abs(totalExpense)), sub:'含採購、活動等'},
    {cls:'c-teal',  icon:'📊', label:'交易筆數',   val: txCount,                sub:'有效紀錄'},
    {cls:'c-purple',icon:'📅', label:'紀錄年份',   val: years,                  sub:'年'},
    {cls:'c-orange',icon:'📈', label:'歷史最高餘額',val: fmtPlain(maxTotal),    sub:'最高點'},
    {cls:'c-yellow',icon:'📉', label:'歷史最低餘額',val: fmtPlain(minTotal),    sub:'最低點'},
  ];
  $('overview-cards').innerHTML = cards.map(c => `
    <div class="card ${c.cls} fade-in">
      <div class="card-icon">${c.icon}</div>
      <div class="card-label">${c.label}</div>
      <div class="card-val">${c.val}</div>
      <div class="card-sub">${c.sub}</div>
    </div>`).join('');

  renderMethodDonut();
  renderYearBar();
  renderPersonBars();
}

// Donut chart — payment methods
function renderMethodDonut() {
  const counts = {};
  DATA.forEach(r => { const m = r.method || '其他'; counts[m] = (counts[m]||0)+1; });
  const total = Object.values(counts).reduce((a,b)=>a+b,0);
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const COLORS = ['#4d9eff','#34d399','#f87171','#a78bfa','#fbbf24','#2dd4bf'];
  const cx=90,cy=90,R=70,r=44;
  let angle = -Math.PI/2, paths='';
  sorted.forEach(([name,cnt],i) => {
    const frac = cnt/total, ang = frac*2*Math.PI;
    const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    angle+=ang;
    const x2=cx+R*Math.cos(angle),y2=cy+R*Math.sin(angle);
    const x3=cx+r*Math.cos(angle),y3=cy+r*Math.sin(angle);
    const x4=cx+r*Math.cos(angle-ang),y4=cy+r*Math.sin(angle-ang);
    const lg = frac > .5 ? 1 : 0;
    paths += `<path d="M${x4} ${y4} A${r} ${r} 0 ${lg} 1 ${x3} ${y3} L${x2} ${y2} A${R} ${R} 0 ${lg} 0 ${x1} ${y1} Z"
      fill="${COLORS[i]}" opacity=".85"><title>${name}: ${cnt}筆 (${(frac*100).toFixed(1)}%)</title></path>`;
  });
  $('donut-svg').innerHTML = paths + `<circle cx="${cx}" cy="${cy}" r="${r-4}" fill="var(--bg3)"/>`;
  $('donut-legend').innerHTML = sorted.map(([name,cnt],i) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i]}"></div>${name} <span style="color:var(--text3);margin-left:4px">${cnt}</span></div>`
  ).join('');
}

// Bar chart — yearly income / expense
function renderYearBar() {
  const yearData = {};
  DATA.forEach(r => {
    const yr = (r.date||'').slice(0,4);
    if (!yr) return;
    if (!yearData[yr]) yearData[yr] = {in:0, out:0};
    yearData[yr].in  += Math.max(0, Number(r.local)||0) + Math.max(0, Number(r.account)||0);
    yearData[yr].out += Math.abs(Math.min(0, Number(r.local)||0)) + Math.abs(Math.min(0, Number(r.account)||0));
  });
  const years = Object.keys(yearData).sort();
  const W=560,H=200,PAD={t:20,r:20,b:40,l:55};
  const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;
  const maxV = Math.max(...years.map(y=>Math.max(yearData[y].in, yearData[y].out)));
  const bw = Math.floor(iW/years.length*0.35);
  const gap = iW/years.length;
  let svg='';
  // grid
  for(let i=0;i<=4;i++){
    const y=PAD.t+iH*i/4;
    const v=Math.round(maxV*(1-i/4));
    svg+=`<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="#2a3a55" stroke-width="1" stroke-dasharray="3 3"/>
          <text x="${PAD.l-6}" y="${y+4}" text-anchor="end" font-size="9" fill="#546a8c" font-family="JetBrains Mono">$${(v/1000).toFixed(0)}k</text>`;
  }
  years.forEach((yr,i) => {
    const x = PAD.l + i*gap + gap/2;
    const d = yearData[yr];
    const inH  = d.in  / maxV * iH;
    const outH = d.out / maxV * iH;
    svg += `<rect x="${x-bw-2}" y="${PAD.t+iH-inH}"  width="${bw}" height="${inH}"  fill="#34d399" opacity=".8" rx="2"><title>${yr} 收入: $${Math.round(d.in).toLocaleString()}</title></rect>`;
    svg += `<rect x="${x+2}"    y="${PAD.t+iH-outH}" width="${bw}" height="${outH}" fill="#f87171" opacity=".8" rx="2"><title>${yr} 支出: $${Math.round(d.out).toLocaleString()}</title></rect>`;
    svg += `<text x="${x}" y="${H-PAD.b+14}" text-anchor="middle" font-size="9" fill="#546a8c" font-family="JetBrains Mono">${yr.slice(2)}</text>`;
  });
  svg += `<rect x="${W-PAD.r-90}" y="${PAD.t}" width="10" height="10" fill="#34d399" rx="2"/>
          <text x="${W-PAD.r-76}" y="${PAD.t+8}" font-size="9" fill="#8fa4c8" font-family="JetBrains Mono">收入</text>
          <rect x="${W-PAD.r-45}" y="${PAD.t}" width="10" height="10" fill="#f87171" rx="2"/>
          <text x="${W-PAD.r-31}" y="${PAD.t+8}" font-size="9" fill="#8fa4c8" font-family="JetBrains Mono">支出</text>`;
  $('bar-chart-svg').innerHTML = svg;
}

// Person bars
function renderPersonBars() {
  const cnts = {};
  DATA.forEach(r => { const p = r.person||'—'; cnts[p]=(cnts[p]||0)+1; });
  const sorted = Object.entries(cnts).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0][1];
  $('person-bars').innerHTML = sorted.map(([p,c]) => `
    <div class="person-row">
      <div class="person-name">${p}</div>
      <div class="person-track"><div class="person-fill" style="width:${c/max*100}%"></div></div>
      <div class="person-count">${c} 筆</div>
    </div>`).join('');
}

// ────────────────────────────────────────────────────────────
//  LEDGER TABLE
// ────────────────────────────────────────────────────────────
let filteredData = [];
let sortCol = null, sortAsc = true;
const PAGE_SIZE = 25;
let currentPage = 1;

function initLedgerFilters() {
  const persons = [...new Set(DATA.map(r=>r.person).filter(Boolean))].sort();
  const methods = [...new Set(DATA.map(r=>r.method).filter(Boolean))].sort();
  const years   = [...new Set(DATA.map(r=>(r.date||'').slice(0,4)).filter(Boolean))].sort().reverse();
  $('filter-person').innerHTML = '<option value="">所有負責人</option>' + persons.map(p=>`<option>${p}</option>`).join('');
  $('filter-method').innerHTML = '<option value="">所有方式</option>'   + methods.map(m=>`<option>${m}</option>`).join('');
  $('filter-year').innerHTML   = '<option value="">所有年份</option>'   + years.map(y=>`<option>${y}</option>`).join('');
  ['search','filter-person','filter-method','filter-type','filter-year'].forEach(id => {
    $(id).addEventListener('input', () => { currentPage=1; applyFilters(); });
  });
}

function applyFilters() {
  const q  = ($('search').value||'').toLowerCase().trim();
  const fp = $('filter-person').value;
  const fm = $('filter-method').value;
  const ft = $('filter-type').value;
  const fy = $('filter-year').value;
  filteredData = DATA.filter(r => {
    if (fp && r.person !== fp) return false;
    if (fm && r.method !== fm) return false;
    if (fy && !(r.date||'').startsWith(fy)) return false;
    if (ft && getType(r) !== ft) return false;
    if (q) {
      const haystack = [r.item,r.person,r.method,r.flow,r.note].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
  if (sortCol) {
    filteredData.sort((a,b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (av===null||av===undefined) av = sortAsc?Infinity:-Infinity;
      if (bv===null||bv===undefined) bv = sortAsc?Infinity:-Infinity;
      if (typeof av==='string') return sortAsc?av.localeCompare(bv):bv.localeCompare(av);
      return sortAsc ? av-bv : bv-av;
    });
  }
  $('result-count').textContent = `共 ${filteredData.length} 筆`;
  renderPage();
  renderPagination();
}

function renderPage() {
  const start = (currentPage-1)*PAGE_SIZE;
  const page  = filteredData.slice(start, start+PAGE_SIZE);
  $('ledger-body').innerHTML = page.length === 0
    ? `<tr><td colspan="13" class="no-data">😶 無符合的紀錄</td></tr>`
    : page.map((r,i) => {
        const idx = start+i+1;
        const type = getType(r);
        return `<tr>
          <td class="td-idx">${idx}</td>
          <td class="td-date">${r.date||'—'}</td>
          <td class="td-item">${r.item||'—'}</td>
          <td>${typeTag(type)}</td>
          <td class="td-method">${r.method||'—'}</td>
          <td class="td-person">${r.person||'—'}</td>
          <td class="td-flow">${r.flow||'—'}</td>
          <td class="td-num">${fmt(r.local,true)}</td>
          <td class="td-num">${r.localBalance!==null&&r.localBalance!==undefined&&r.localBalance!=='' ? '$'+Number(r.localBalance).toLocaleString() : '<span class="neu">—</span>'}</td>
          <td class="td-num">${fmt(r.account,true)}</td>
          <td class="td-num">${r.accountBalance!==null&&r.accountBalance!==undefined&&r.accountBalance!=='' ? '<span style="color:var(--purple)">$'+Number(r.accountBalance).toLocaleString()+'</span>' : '<span class="neu">—</span>'}</td>
          <td class="td-num td-total">${r.total!==null&&r.total!==undefined&&r.total!=='' ? '$'+Number(r.total).toLocaleString() : '<span class="neu">—</span>'}</td>
          <td class="td-note">${r.note||''}</td>
        </tr>`;
      }).join('');
}

function renderPagination() {
  const total = filteredData.length;
  const pages = Math.ceil(total/PAGE_SIZE);
  $('page-info').textContent = `第 ${currentPage} / ${pages} 頁（${total} 筆）`;
  const btns = [];
  btns.push(`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>`);
  let s=Math.max(1,currentPage-2), e=Math.min(pages,s+4);
  s=Math.max(1,e-4);
  for(let p=s;p<=e;p++) btns.push(`<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`);
  btns.push(`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=pages?'disabled':''}>›</button>`);
  $('page-btns').innerHTML = btns.join('');
}

function goPage(p) {
  const pages = Math.ceil(filteredData.length/PAGE_SIZE);
  currentPage = Math.max(1, Math.min(pages, p));
  renderPage();
  renderPagination();
  $('sec-ledger').scrollIntoView({behavior:'smooth',block:'start'});
}

// Sort by column header click
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    sortCol === col ? (sortAsc = !sortAsc) : (sortCol=col, sortAsc=true);
    document.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.si').textContent = sortAsc?' ↑':' ↓';
    currentPage=1; applyFilters();
  });
});

function resetFilters() {
  $('search').value=''; $('filter-person').value=''; $('filter-method').value='';
  $('filter-type').value=''; $('filter-year').value='';
  sortCol=null; sortAsc=true;
  document.querySelectorAll('th').forEach(t=>{t.classList.remove('sorted');const si=t.querySelector('.si');if(si)si.textContent='↕';});
  currentPage=1; applyFilters();
}

// ────────────────────────────────────────────────────────────
//  TREND CHART
// ────────────────────────────────────────────────────────────
let currentTrend = 'total';
function drawTrend(field) {
  currentTrend = field;
  document.querySelectorAll('.trend-opt').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(
      field==='total'?'總餘額':field==='local'?'現金':'帳戶'
    ));
  });
  const pts = DATA
    .filter(r => r[field+'Balance']!==null && r[field+'Balance']!==undefined && r[field+'Balance']!=='' || r[field]!==null)
    .map(r => {
      let val;
      if (field === 'total') val = Number(r.total)||null;
      else if (field === 'local') val = Number(r.localBalance)||null;
      else val = Number(r.accountBalance)||null;
      return { date: r.date, val };
    })
    .filter(p => p.val !== null && !isNaN(p.val) && p.date);

  if (!pts.length) return;
  const W=1000,H=320,PAD={t:20,r:20,b:50,l:70};
  const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;
  const vals = pts.map(p=>p.val);
  const minV = Math.min(...vals)*0.99, maxV = Math.max(...vals)*1.01;
  const xs = pts.map((_,i)=>PAD.l+i*iW/(pts.length-1));
  const ys = pts.map(p=>PAD.t+iH*(1-(p.val-minV)/(maxV-minV)));

  // Grid
  let svg='';
  for(let i=0;i<=5;i++){
    const y=PAD.t+iH*i/5;
    const v=Math.round(maxV-(maxV-minV)*i/5);
    svg+=`<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="#2a3a55" stroke-width="1" stroke-dasharray="4 3"/>
          <text x="${PAD.l-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#546a8c" font-family="JetBrains Mono">$${(v/1000).toFixed(0)}k</text>`;
  }
  // X labels (sample every N)
  const step = Math.max(1, Math.floor(pts.length/10));
  pts.forEach((p,i)=>{
    if(i%step===0||i===pts.length-1)
      svg+=`<text x="${xs[i]}" y="${H-PAD.b+16}" text-anchor="middle" font-size="9" fill="#546a8c" font-family="JetBrains Mono">${(p.date||'').slice(2,7)}</text>`;
  });
  // Area
  const linePath = `M${xs[0]},${ys[0]} `+xs.slice(1).map((x,i)=>`L${x},${ys[i+1]}`).join(' ');
  const areaPath = linePath + ` L${xs[xs.length-1]},${PAD.t+iH} L${xs[0]},${PAD.t+iH} Z`;
  const COLOR = field==='total'?'#4d9eff':field==='local'?'#34d399':'#a78bfa';
  svg+=`<defs>
    <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${COLOR}" stop-opacity=".3"/>
      <stop offset="100%" stop-color="${COLOR}" stop-opacity=".02"/>
    </linearGradient></defs>
    <path d="${areaPath}" fill="url(#tg)"/>
    <path d="${linePath}" fill="none" stroke="${COLOR}" stroke-width="2" stroke-linejoin="round"/>`;
  // Dots (every N)
  const ds = Math.max(1, Math.floor(pts.length/40));
  pts.forEach((p,i)=>{
    if(i%ds===0||i===pts.length-1)
      svg+=`<circle cx="${xs[i]}" cy="${ys[i]}" r="3" fill="${COLOR}" stroke="var(--bg)" stroke-width="1.5">
              <title>${p.date}  $${Number(p.val).toLocaleString()}</title></circle>`;
  });
  $('trend-svg').innerHTML = svg;
}

// ────────────────────────────────────────────────────────────
//  PERSONS DETAIL
// ────────────────────────────────────────────────────────────
function renderPersonsDetail() {
  const persons = {};
  DATA.forEach(r => {
    const p = r.person||'—';
    if (!persons[p]) persons[p]={count:0,income:0,expense:0,items:[]};
    persons[p].count++;
    persons[p].income  += Math.max(0, Number(r.local)||0) + Math.max(0, Number(r.account)||0);
    persons[p].expense += Math.abs(Math.min(0, Number(r.local)||0)) + Math.abs(Math.min(0, Number(r.account)||0));
    persons[p].items.push(r);
  });
  const sorted = Object.entries(persons).sort((a,b)=>b[1].count-a[1].count);
  $('persons-detail').innerHTML = sorted.map(([name,d]) => `
    <div class="chart-box" style="margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px">
        <div>
          <div style="font-size:1rem;font-weight:600;color:var(--text)">${name}</div>
          <div style="font-size:.78rem;color:var(--text3);margin-top:4px">${d.count} 筆紀錄</div>
        </div>
        <div style="display:flex;gap:20px;flex-wrap:wrap">
          <div><div style="font-size:.7rem;color:var(--text3)">經手收入</div><div style="font-family:'JetBrains Mono',monospace;color:var(--green)">$${Math.round(d.income).toLocaleString()}</div></div>
          <div><div style="font-size:.7rem;color:var(--text3)">經手支出</div><div style="font-family:'JetBrains Mono',monospace;color:var(--red)">$${Math.round(d.expense).toLocaleString()}</div></div>
          <div><div style="font-size:.7rem;color:var(--text3)">常見項目</div><div style="font-size:.8rem;color:var(--text2)">${getTopItems(d.items)}</div></div>
        </div>
      </div>
    </div>`).join('');
}

function getTopItems(items) {
  const c = {};
  items.forEach(r => { if(r.item) c[r.item]=(c[r.item]||0)+1; });
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${k}(${v})`).join('、');
}

// ────────────────────────────────────────────────────────────
//  INIT — load JSON file
// ────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('npc_data.json');
    DATA = await res.json();
  } catch(e) {
    console.error('Could not load npc_data.json, using embedded data', e);
    DATA = [];
  }
  if (!DATA.length) {
    document.body.innerHTML = '<div style="padding:60px;text-align:center;color:#f87171;font-size:1.1rem">⚠️ 無法載入資料，請確認 npc_data.json 與此 HTML 位於同一目錄。</div>';
    return;
  }
  filteredData = [...DATA];
  renderOverview();
  initLedgerFilters();
  applyFilters();
  drawTrend('total');
}

init();
</script>
